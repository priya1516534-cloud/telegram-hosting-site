<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🛰️ HOSTING DASHBOARD</title>
    <style>
        body { background: #000; color: #58a6ff; font-family: sans-serif; text-align: center; }
        .card { max-width: 600px; margin: 50px auto; background: #161b22; padding: 20px; border-radius: 15px; border: 1px solid #30363d; }
        .status { color: #238636; font-weight: bold; font-size: 20px; }
        .bot-info { background: #0d1117; padding: 15px; border-left: 5px solid #238636; text-align: left; margin: 20px 0; }
        .btn { display: inline-block; padding: 10px 20px; color: #fff; background: #238636; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="status">✅ HOSTING IS LIVE</div>
        <div class="bot-info">
            <p>🤖 <b>Bot Name:</b> {{ bot_name }}</p>
            <p>🆔 <b>Username:</b> @{{ bot_username }}</p>
            <p>👑 <b>Commander:</b> {{ commander }}</p>
            <p>📦 <b>Commands Loaded:</b> {{ cmd_count }}</p>
        </div>
        <p>Ab aap apne Telegram bot par jaakar commands test kar sakte hain.</p>
        <a href="/" class="btn">Add Another Bot</a>
    </div>
</body>
</html>
