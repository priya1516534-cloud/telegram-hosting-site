<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🛸 NEXUS COMMANDER | DEPLOYMENT</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; text-align: center; }
        .box { max-width: 500px; margin: 50px auto; border: 2px solid #00ff41; padding: 30px; box-shadow: 0 0 20px #00ff41; border-radius: 10px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #00ff41; color: #00ff41; }
        button { background: #00ff41; color: #000; font-weight: bold; cursor: pointer; }
        h2 { text-shadow: 2px 2px #000; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>⚔️ NEXUS CORE DEPLOY ⚔️</h2>
        <p>Enter Token & Config File to Initialize</p>
        <form action="/upload" method="POST" enctype="multipart/form-data">
            <input type="text" name="bot_token" placeholder="🔑 Enter Bot Token" required>
            <input type="text" name="user_name" placeholder="👤 Commander Name" required>
            <input type="date" name="user_dob" required>
            <input type="file" name="file" required>
            <button type="submit">🚀 INITIALIZE HOSTING</button>
        </form>
    </div>
</body>
</html>
